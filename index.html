<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Truyerba · Content Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<style>
:root{
  --green-900:#0D2E14;--green-800:#134E25;--green-700:#166534;
  --green-500:#22C55E;--green-400:#4ADE80;--green-100:#DCFCE7;--green-50:#F0FDF4;
  --amber:#F59E0B;--amber-light:#FEF3C7;
  --red:#EF4444;--red-light:#FEE2E2;
  --blue:#3B82F6;--blue-light:#DBEAFE;
  --bg:#F1F5F9;--card:#FFFFFF;--border:#E2E8F0;
  --text:#0F172A;--text-2:#475569;--text-3:#94A3B8;
  --sidebar-w:260px;--header-h:64px;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.05);
  --shadow-lg:0 10px 40px rgba(0,0,0,.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* ── Header ── */
header{height:var(--header-h);background:var(--green-800);display:flex;align-items:center;padding:0 20px;gap:16px;z-index:100;flex-shrink:0;border-bottom:2px solid var(--green-700);}
.logo{display:flex;align-items:center;gap:10px;width:var(--sidebar-w);flex-shrink:0;}
.logo-mark{width:36px;height:36px;background:var(--green-500);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff;letter-spacing:-1px;}
.logo-name{font-size:18px;font-weight:700;color:#fff;letter-spacing:.5px;}
.logo-name span{color:var(--green-400);}
.header-search{flex:1;max-width:380px;position:relative;}
.header-search input{width:100%;padding:8px 16px 8px 40px;border-radius:8px;border:none;background:rgba(255,255,255,.12);color:#fff;font-size:14px;outline:none;}
.header-search input::placeholder{color:rgba(255,255,255,.5);}
.header-search i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.5);font-size:13px;}
.header-actions{margin-left:auto;display:flex;align-items:center;gap:10px;}
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s;}
.btn-primary{background:var(--green-500);color:#fff;}
.btn-primary:hover{background:var(--green-400);}
.btn-outline{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);}
.btn-outline:hover{background:rgba(255,255,255,.2);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-ghost{background:transparent;color:var(--text-2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--bg);}
.btn-danger{background:var(--red);color:#fff;}
.btn-danger:hover{opacity:.9;}

/* ── Layout ── */
.app-body{display:flex;flex:1;overflow:hidden;}

/* ── Sidebar ── */
aside{width:var(--sidebar-w);background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.sidebar-section{padding:16px 12px 8px;}
.sidebar-label{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;padding:0 8px;margin-bottom:6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:.12s;margin-bottom:2px;font-size:13px;font-weight:500;color:var(--text-2);position:relative;}
.nav-item:hover{background:var(--green-50);color:var(--green-700);}
.nav-item.active{background:var(--green-100);color:var(--green-700);font-weight:600;}
.nav-item .icon{font-size:15px;width:20px;text-align:center;}
.nav-item .label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-item .count{background:var(--border);color:var(--text-2);font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;}
.nav-item.active .count{background:var(--green-500);color:#fff;}
.nav-divider{height:1px;background:var(--border);margin:8px 12px;}
.sidebar-footer{padding:12px;margin-top:auto;}
.btn-add-cat{width:100%;justify-content:center;background:var(--green-50);color:var(--green-700);border:1.5px dashed var(--green-400);}
.btn-add-cat:hover{background:var(--green-100);}

/* ── Main ── */
main{flex:1;overflow-y:auto;padding:24px;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.page-title{font-size:22px;font-weight:700;color:var(--text);}
.page-title span{color:var(--green-600);}
.page-sub{font-size:13px;color:var(--text-3);margin-top:2px;}

/* ── Stats ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:var(--card);border-radius:var(--radius);padding:18px 20px;border:1px solid var(--border);box-shadow:var(--shadow);}
.stat-card .s-label{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.stat-card .s-val{font-size:28px;font-weight:800;color:var(--text);line-height:1;}
.stat-card .s-sub{font-size:12px;color:var(--text-3);margin-top:6px;}
.stat-card.green .s-val{color:var(--green-700);}
.stat-card.amber .s-val{color:var(--amber);}
.stat-card.red .s-val{color:var(--red);}

/* ── Filters Bar ── */
.filters-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.filter-select{padding:7px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:13px;background:#fff;color:var(--text);outline:none;cursor:pointer;}
.filter-select:focus{border-color:var(--green-500);}
.filter-tag{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--text-2);transition:.12s;}
.filter-tag.active{background:var(--green-700);color:#fff;border-color:var(--green-700);}

/* ── Content Grid ── */
.content-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.content-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);transition:.15s;cursor:pointer;}
.content-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);}
.card-preview{height:170px;background:linear-gradient(135deg,var(--green-900),var(--green-700));display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.card-preview img{width:100%;height:100%;object-fit:cover;}
.card-preview iframe{width:100%;height:100%;border:none;pointer-events:none;}
.card-preview .preview-icon{font-size:40px;color:rgba(255,255,255,.3);}
.card-preview .preview-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);opacity:0;transition:.15s;}
.content-card:hover .preview-overlay{opacity:1;}
.preview-overlay .btn{background:#fff;color:var(--green-700);}
.card-badge{position:absolute;top:10px;left:10px;}
.card-body{padding:14px;}
.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-provider{font-size:12px;color:var(--text-3);display:flex;align-items:center;gap:5px;margin-bottom:10px;}
.card-meta{display:flex;align-items:center;justify-content:space-between;}
.card-date{font-size:11px;color:var(--text-3);}
.card-actions{display:flex;gap:6px;opacity:0;transition:.12s;}
.content-card:hover .card-actions{opacity:1;}
.icon-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--text-2);transition:.12s;}
.icon-btn:hover{background:var(--bg);}
.icon-btn.danger:hover{background:var(--red-light);color:var(--red);border-color:var(--red);}
.icon-btn.success:hover{background:var(--green-100);color:var(--green-700);border-color:var(--green-500);}

/* ── Badge ── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-paid{background:var(--green-100);color:var(--green-700);}
.badge-unpaid{background:var(--red-light);color:var(--red);}
.badge-pending{background:var(--amber-light);color:#92400E;}

/* ── Empty State ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;}
.empty-icon{font-size:56px;margin-bottom:16px;opacity:.3;}
.empty h3{font-size:18px;font-weight:600;color:var(--text-2);margin-bottom:8px;}
.empty p{font-size:13px;color:var(--text-3);max-width:300px;line-height:1.6;}

/* ── Dashboard Recent ── */
.section-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-title i{color:var(--green-500);}
.recent-table{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);}
.recent-table table{width:100%;border-collapse:collapse;}
.recent-table th{background:var(--green-50);padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.7px;}
.recent-table td{padding:12px 16px;font-size:13px;border-top:1px solid var(--border);vertical-align:middle;}
.recent-table tr:hover td{background:var(--bg);}
.provider-pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;}
.provider-avatar{width:22px;height:22px;border-radius:50%;background:var(--green-700);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.link-chip{color:var(--blue);font-size:12px;text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
.link-chip:hover{text-decoration:underline;}

/* ── Influencer Card Special ── */
.influencer-card .card-preview{background:linear-gradient(135deg,#1e1b4b,#4c1d95);}
.inf-detail{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.inf-detail .inf-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2);}
.inf-detail .inf-row i{color:var(--green-500);width:14px;}
.inf-price{font-weight:700;color:var(--text);}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal-header{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1;padding-bottom:16px;border-bottom:1px solid var(--border);}
.modal-title{font-size:17px;font-weight:700;color:var(--text);}
.modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:14px;}
.modal-close:hover{background:var(--bg);}
.modal-body{padding:20px 24px;}
.form-group{margin-bottom:16px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
input,select,textarea{width:100%;padding:9px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);font-size:13px;font-family:inherit;color:var(--text);outline:none;transition:.12s;background:#fff;}
input:focus,select:focus,textarea:focus{border-color:var(--green-500);box-shadow:0 0 0 3px rgba(34,197,94,.1);}
textarea{resize:vertical;min-height:80px;}
.form-hint{font-size:11px;color:var(--text-3);margin-top:4px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
.special-fields{background:var(--green-50);border:1px solid var(--green-100);border-radius:var(--radius-sm);padding:14px;margin-bottom:16px;}
.special-fields-title{font-size:11px;font-weight:700;color:var(--green-700);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px;display:flex;align-items:center;gap:6px;}

/* ── Preview Modal ── */
.preview-modal .modal{max-width:800px;}
.preview-frame{width:100%;height:480px;border:none;border-radius:var(--radius-sm);background:var(--bg);}
.preview-img-full{width:100%;max-height:480px;object-fit:contain;border-radius:var(--radius-sm);}

/* ── Toast ── */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:1000;display:flex;flex-direction:column;gap:8px;}
.toast{background:#1e293b;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-lg);animation:slideIn .2s ease;}
.toast.success i{color:var(--green-400);}
.toast.error i{color:var(--red);}
@keyframes slideIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* ── Category View Header ── */
.cat-view-header{display:flex;align-items:center;gap:14px;margin-bottom:22px;padding:20px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);}
.cat-icon-big{width:52px;height:52px;border-radius:14px;background:var(--green-100);display:flex;align-items:center;justify-content:center;font-size:26px;}
.cat-info{flex:1;}
.cat-info h2{font-size:20px;font-weight:700;}
.cat-info p{font-size:13px;color:var(--text-3);margin-top:2px;}
.cat-stats{display:flex;gap:20px;}
.cat-stat{text-align:center;}
.cat-stat .v{font-size:20px;font-weight:800;}
.cat-stat .l{font-size:10px;color:var(--text-3);text-transform:uppercase;font-weight:600;}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
::-webkit-scrollbar-thumb:hover{background:var(--text-3);}

/* ── Responsive ── */
@media(max-width:900px){
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .form-row{grid-template-columns:1fr;}
}
@media(max-width:640px){
  aside{display:none;}
  .stats-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header>
  <div class="logo">
    <div class="logo-mark">TY</div>
    <div class="logo-name">Truy<span>erba</span></div>
  </div>
  <div class="header-search">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="globalSearch" placeholder="Search content, providers…"/>
  </div>
  <div class="header-actions">
    <button class="btn btn-outline btn-sm" onclick="exportData()"><i class="fa-solid fa-download"></i> Export</button>
    <button class="btn btn-primary btn-sm" onclick="openAddContent()"><i class="fa-solid fa-plus"></i> Add Content</button>
  </div>
</header>

<!-- ══ BODY ══ -->
<div class="app-body">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-section">
      <div class="nav-label">Menu</div>
      <div class="nav-item active" onclick="showDashboard(this)">
        <span class="icon"><i class="fa-solid fa-house"></i></span>
        <span class="label">Dashboard</span>
      </div>
      <div class="nav-item" onclick="showAllContent(this)">
        <span class="icon"><i class="fa-solid fa-layer-group"></i></span>
        <span class="label">All Content</span>
        <span class="count" id="totalCount">0</span>
      </div>
      <div class="nav-item" onclick="showProviders(this)">
        <span class="icon"><i class="fa-solid fa-users"></i></span>
        <span class="label">Providers</span>
      </div>
    </div>

    <div class="nav-divider"></div>

    <div class="sidebar-section">
      <div class="sidebar-label">Categories</div>
      <div id="categoryNav"></div>
    </div>

    <div class="sidebar-footer">
      <button class="btn btn-add-cat" onclick="openAddCategory()">
        <i class="fa-solid fa-plus"></i> Add Category
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main id="mainArea"></main>
</div>

<!-- ══ MODAL: ADD/EDIT CONTENT ══ -->
<div class="modal-overlay" id="contentModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="contentModalTitle">Add Content</span>
      <button class="modal-close" onclick="closeModal('contentModal')"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId"/>
      <div class="form-group">
        <label>Category *</label>
        <select id="fCategory" onchange="onCategoryChange()"></select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Title / Label *</label>
          <input type="text" id="fTitle" placeholder="e.g. Product Launch Reel"/>
        </div>
        <div class="form-group">
          <label>Content Provider *</label>
          <input type="text" id="fProvider" placeholder="e.g. Studio XYZ"/>
        </div>
      </div>
      <div class="form-group">
        <label>Google Drive Link</label>
        <input type="url" id="fDriveLink" placeholder="https://drive.google.com/…"/>
        <div class="form-hint">Paste a Google Drive / any direct link. Preview will be generated automatically.</div>
      </div>
      <div class="form-group">
        <label>Thumbnail URL <span style="font-weight:400;text-transform:none">(optional)</span></label>
        <input type="url" id="fThumb" placeholder="https://… direct image link for card preview"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Payment Status</label>
          <select id="fPayStatus">
            <option value="unpaid">Unpaid</option>
            <option value="pending">Pending</option>
            <option value="paid">Paid</option>
          </select>
        </div>
        <div class="form-group">
          <label>Amount (₹)</label>
          <input type="number" id="fAmount" placeholder="0.00" min="0"/>
        </div>
      </div>
      <div class="form-group">
        <label>Date Added</label>
        <input type="date" id="fDate"/>
      </div>

      <!-- Model Reel Special -->
      <div id="modelFields" class="special-fields" style="display:none">
        <div class="special-fields-title"><i class="fa-solid fa-user"></i> Model Details</div>
        <div class="form-group" style="margin:0">
          <label>Model Name(s)</label>
          <input type="text" id="fModelName" placeholder="e.g. Sarah, John (comma separated)"/>
        </div>
      </div>

      <!-- Influencer Special -->
      <div id="influencerFields" class="special-fields" style="display:none">
        <div class="special-fields-title"><i class="fa-solid fa-star"></i> Influencer Collab Details</div>
        <div class="form-row">
          <div class="form-group">
            <label>Influencer Name *</label>
            <input type="text" id="fInfluencerName" placeholder="@username or full name"/>
          </div>
          <div class="form-group">
            <label>Collab Price (₹)</label>
            <input type="number" id="fInfluencerPrice" placeholder="0.00" min="0"/>
          </div>
        </div>
        <div class="form-group" style="margin:0">
          <label>Product(s) Included</label>
          <input type="text" id="fProduct" placeholder="e.g. Yerba Mate Classic 500g, Sample Pack"/>
        </div>
      </div>

      <div class="form-group">
        <label>Notes</label>
        <textarea id="fNotes" placeholder="Any additional notes…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('contentModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveContent()"><i class="fa-solid fa-floppy-disk"></i> Save</button>
    </div>
  </div>
</div>

<!-- ══ MODAL: ADD CATEGORY ══ -->
<div class="modal-overlay" id="categoryModal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <span class="modal-title">Add New Category</span>
      <button class="modal-close" onclick="closeModal('categoryModal')"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Category Name *</label>
        <input type="text" id="cName" placeholder="e.g. YouTube Shorts"/>
      </div>
      <div class="form-group">
        <label>Emoji Icon</label>
        <input type="text" id="cIcon" placeholder="🎥" maxlength="4"/>
        <div class="form-hint">Paste any emoji to represent this category.</div>
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="cType">
          <option value="default">Default</option>
          <option value="model">Model (has model name field)</option>
          <option value="influencer">Influencer (has collab fields)</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('categoryModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveCategory()"><i class="fa-solid fa-plus"></i> Add Category</button>
    </div>
  </div>
</div>

<!-- ══ MODAL: PREVIEW ══ -->
<div class="modal-overlay preview-modal" id="previewModal">
  <div class="modal" style="max-width:820px">
    <div class="modal-header">
      <span class="modal-title" id="previewTitle">Preview</span>
      <div style="display:flex;gap:8px;align-items:center">
        <a id="previewOpenLink" href="#" target="_blank" class="btn btn-ghost btn-sm"><i class="fa-solid fa-arrow-up-right-from-square"></i> Open</a>
        <button class="modal-close" onclick="closeModal('previewModal')"><i class="fa-solid fa-xmark"></i></button>
      </div>
    </div>
    <div class="modal-body" id="previewBody"></div>
  </div>
</div>

<!-- ══ TOAST CONTAINER ══ -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ══════════════════════════════════════════════════════
//  DATA LAYER
// ══════════════════════════════════════════════════════
const DEFAULT_CATEGORIES = [
  {id:'cat_inf_reel', name:'Informative Reels',     icon:'🎬', type:'default',    isDefault:true},
  {id:'cat_motion',   name:'Motion Graphics Reels', icon:'✨', type:'default',    isDefault:true},
  {id:'cat_product',  name:'Product Photography',   icon:'📸', type:'default',    isDefault:true},
  {id:'cat_model',    name:'Model Reel',             icon:'👗', type:'model',      isDefault:true},
  {id:'cat_ai',       name:'AI Reel',               icon:'🤖', type:'default',    isDefault:true},
  {id:'cat_carousel', name:'Carousel',              icon:'🔄', type:'default',    isDefault:true},
  {id:'cat_insta',    name:'Instagram Posts',       icon:'📱', type:'default',    isDefault:true},
  {id:'cat_fb',       name:'Facebook Posts',        icon:'👥', type:'default',    isDefault:true},
  {id:'cat_li',       name:'LinkedIn Posts',        icon:'💼', type:'default',    isDefault:true},
  {id:'cat_poster',   name:'Poster',               icon:'🖼️', type:'default',    isDefault:true},
  {id:'cat_influencer',name:'Influencer Collabs',  icon:'🤝', type:'influencer', isDefault:true},
];

function loadData(){
  const cats = JSON.parse(localStorage.getItem('ty_categories')||'null');
  const contents = JSON.parse(localStorage.getItem('ty_contents')||'[]');
  if(!cats){
    localStorage.setItem('ty_categories',JSON.stringify(DEFAULT_CATEGORIES));
    return {categories:DEFAULT_CATEGORIES, contents};
  }
  return {categories:cats, contents};
}

function saveData(data){
  localStorage.setItem('ty_categories',JSON.stringify(data.categories));
  localStorage.setItem('ty_contents',JSON.stringify(data.contents));
}

let DB = loadData();

function getCat(id){return DB.categories.find(c=>c.id===id);}
function getCatContents(catId){return DB.contents.filter(c=>c.categoryId===catId);}
function uid(){return 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);}

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let currentView = 'dashboard';
let currentCatId = null;
let searchQuery = '';
let filterProvider = '';
let filterStatus = '';

// ══════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════
function fmtDate(d){
  if(!d) return '—';
  return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
}
function initials(name){
  return name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase()||'?';
}
function extractDrivePreview(url){
  if(!url) return null;
  // Google Drive file
  const m = url.match(/\/file\/d\/([^/]+)/);
  if(m) return `https://drive.google.com/file/d/${m[1]}/preview`;
  // Google Drive open?id=
  const m2 = url.match(/[?&]id=([^&]+)/);
  if(m2) return `https://drive.google.com/file/d/${m2[1]}/preview`;
  return url;
}
function isImage(url){
  return url && /\.(jpg|jpeg|png|gif|webp|svg)(\?|$)/i.test(url);
}
function allProviders(){
  const set = new Set(DB.contents.map(c=>c.provider).filter(Boolean));
  return [...set].sort();
}

function toast(msg, type='success'){
  const t = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<i class="fa-solid fa-${type==='success'?'circle-check':'circle-exclamation'}"></i> ${msg}`;
  t.appendChild(el);
  setTimeout(()=>el.remove(), 3200);
}

// ══════════════════════════════════════════════════════
//  RENDER SIDEBAR
// ══════════════════════════════════════════════════════
function renderSidebar(){
  const nav = document.getElementById('categoryNav');
  nav.innerHTML = DB.categories.map(cat=>{
    const count = getCatContents(cat.id).length;
    return `<div class="nav-item" data-cat="${cat.id}" onclick="showCategory('${cat.id}',this)">
      <span class="icon">${cat.icon}</span>
      <span class="label">${cat.name}</span>
      ${count>0?`<span class="count">${count}</span>`:''}
    </div>`;
  }).join('');
  document.getElementById('totalCount').textContent = DB.contents.length;
}

function setActiveNav(el){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(el) el.classList.add('active');
}

// ══════════════════════════════════════════════════════
//  BADGE HTML
// ══════════════════════════════════════════════════════
function badgeHtml(status){
  const map={
    paid:`<span class="badge badge-paid"><i class="fa-solid fa-check"></i> Paid</span>`,
    unpaid:`<span class="badge badge-unpaid"><i class="fa-solid fa-clock"></i> Unpaid</span>`,
    pending:`<span class="badge badge-pending"><i class="fa-solid fa-hourglass-half"></i> Pending</span>`,
  };
  return map[status]||map.unpaid;
}

// ══════════════════════════════════════════════════════
//  CARD HTML
// ══════════════════════════════════════════════════════
function cardHtml(item){
  const cat = getCat(item.categoryId);
  const previewUrl = extractDrivePreview(item.driveLink);
  let previewHtml;
  if(item.thumbnailUrl && isImage(item.thumbnailUrl)){
    previewHtml = `<img src="${item.thumbnailUrl}" alt="preview" onerror="this.style.display='none'"/>`;
  } else if(item.thumbnailUrl || item.driveLink){
    previewHtml = `<div class="preview-icon"><i class="fa-solid fa-${cat?.type==='influencer'?'star':cat?.type==='model'?'user':'film'}"></i></div>`;
  } else {
    previewHtml = `<div class="preview-icon"><i class="fa-solid fa-image"></i></div>`;
  }

  const extraHtml = cat?.type==='influencer' && item.influencerName ? `
    <div class="inf-detail">
      <div class="inf-row"><i class="fa-solid fa-star"></i> ${item.influencerName}</div>
      ${item.productIncluded?`<div class="inf-row"><i class="fa-solid fa-box"></i> ${item.productIncluded}</div>`:''}
      ${item.price?`<div class="inf-row"><i class="fa-solid fa-indian-rupee-sign"></i> <span class="inf-price">₹${Number(item.price).toLocaleString('en-IN')}</span></div>`:''}
    </div>` : cat?.type==='model' && item.modelName ? `
    <div class="inf-detail">
      <div class="inf-row"><i class="fa-solid fa-user"></i> ${item.modelName}</div>
    </div>` : '';

  return `<div class="content-card${cat?.type==='influencer'?' influencer-card':''}" id="card_${item.id}">
    <div class="card-preview">
      ${previewHtml}
      <span class="card-badge">${badgeHtml(item.paymentStatus)}</span>
      <div class="preview-overlay">
        ${previewUrl?`<button class="btn btn-sm" onclick="event.stopPropagation();openPreview('${item.id}')"><i class="fa-solid fa-eye"></i> Preview</button>`:''}
      </div>
    </div>
    <div class="card-body">
      <div class="card-title" title="${item.title}">${item.title}</div>
      <div class="card-provider"><div class="provider-avatar">${initials(item.provider)}</div>${item.provider}</div>
      ${extraHtml}
      ${item.amount?`<div style="font-size:12px;color:var(--green-700);font-weight:600;margin-bottom:8px;">₹${Number(item.amount).toLocaleString('en-IN')}</div>`:''}
      <div class="card-meta">
        <span class="card-date"><i class="fa-regular fa-calendar" style="margin-right:4px;"></i>${fmtDate(item.dateAdded)}</span>
        <div class="card-actions">
          ${item.driveLink?`<a href="${item.driveLink}" target="_blank" class="icon-btn" onclick="event.stopPropagation()" title="Open Drive"><i class="fa-solid fa-arrow-up-right-from-square"></i></a>`:''}
          ${item.paymentStatus!=='paid'?`<button class="icon-btn success" onclick="event.stopPropagation();markPaid('${item.id}')" title="Mark Paid"><i class="fa-solid fa-check"></i></button>`:''}
          <button class="icon-btn" onclick="event.stopPropagation();openEditContent('${item.id}')" title="Edit"><i class="fa-solid fa-pen"></i></button>
          <button class="icon-btn danger" onclick="event.stopPropagation();deleteContent('${item.id}')" title="Delete"><i class="fa-solid fa-trash"></i></button>
        </div>
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════
//  VIEWS
// ══════════════════════════════════════════════════════
function showDashboard(el){
  currentView='dashboard'; currentCatId=null;
  setActiveNav(el||document.querySelector('.nav-item'));
  filterProvider=''; filterStatus=''; searchQuery='';
  renderDashboard();
}

function renderDashboard(){
  const total = DB.contents.length;
  const paid = DB.contents.filter(c=>c.paymentStatus==='paid').length;
  const unpaid = DB.contents.filter(c=>c.paymentStatus==='unpaid').length;
  const pending = DB.contents.filter(c=>c.paymentStatus==='pending').length;
  const totalAmt = DB.contents.filter(c=>c.paymentStatus==='paid').reduce((a,c)=>a+(Number(c.amount)||0),0);

  const recent = [...DB.contents].sort((a,b)=>new Date(b.dateAdded)-new Date(a.dateAdded)).slice(0,8);

  document.getElementById('mainArea').innerHTML = `
  <div class="page-header">
    <div><div class="page-title">Dashboard</div><div class="page-sub">Welcome back · ${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})}</div></div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="s-label">Total Content</div><div class="s-val">${total}</div><div class="s-sub">Across ${DB.categories.length} categories</div></div>
    <div class="stat-card green"><div class="s-label">Paid</div><div class="s-val">${paid}</div><div class="s-sub">₹${totalAmt.toLocaleString('en-IN')} disbursed</div></div>
    <div class="stat-card amber"><div class="s-label">Pending</div><div class="s-val">${pending}</div><div class="s-sub">Awaiting approval</div></div>
    <div class="stat-card red"><div class="s-label">Unpaid</div><div class="s-val">${unpaid}</div><div class="s-sub">Needs payment</div></div>
  </div>

  <div class="section-title" style="margin-bottom:14px"><i class="fa-solid fa-grid-2"></i> Categories Overview</div>
  <div class="content-grid" style="margin-bottom:28px">
    ${DB.categories.map(cat=>{
      const items = getCatContents(cat.id);
      const catPaid = items.filter(i=>i.paymentStatus==='paid').length;
      return `<div class="content-card" onclick="showCategory('${cat.id}',null)" style="cursor:pointer">
        <div class="card-preview" style="height:90px;background:linear-gradient(135deg,var(--green-900),var(--green-700))">
          <span style="font-size:34px">${cat.icon}</span>
        </div>
        <div class="card-body" style="padding:12px">
          <div class="card-title">${cat.name}</div>
          <div style="display:flex;gap:8px;align-items:center;margin-top:6px">
            <span class="badge badge-paid">${catPaid} paid</span>
            <span style="font-size:12px;color:var(--text-3)">${items.length} total</span>
          </div>
        </div>
      </div>`;
    }).join('')}
  </div>

  ${recent.length>0?`
  <div class="section-title"><i class="fa-solid fa-clock-rotate-left"></i> Recent Content</div>
  <div class="recent-table">
    <table>
      <thead><tr>
        <th>Title</th><th>Provider</th><th>Category</th><th>Status</th><th>Amount</th><th>Date</th><th>Link</th>
      </tr></thead>
      <tbody>
        ${recent.map(item=>{
          const cat=getCat(item.categoryId);
          return `<tr>
            <td><strong>${item.title}</strong></td>
            <td><div class="provider-pill"><div class="provider-avatar">${initials(item.provider)}</div>${item.provider}</div></td>
            <td>${cat?`${cat.icon} ${cat.name}`:'—'}</td>
            <td>${badgeHtml(item.paymentStatus)}</td>
            <td>${item.amount?`₹${Number(item.amount).toLocaleString('en-IN')}`:'—'}</td>
            <td>${fmtDate(item.dateAdded)}</td>
            <td>${item.driveLink?`<a class="link-chip" href="${item.driveLink}" target="_blank"><i class="fa-solid fa-link"></i> Open</a>`:'—'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`:''}`;
}

function showCategory(catId, el){
  currentView='category'; currentCatId=catId;
  setActiveNav(el || document.querySelector(`[data-cat="${catId}"]`));
  filterProvider=''; filterStatus=''; searchQuery='';
  renderCategory();
}

function renderCategory(){
  const cat = getCat(currentCatId);
  if(!cat) return;
  let items = getCatContents(currentCatId);

  // Apply filters
  if(filterProvider) items = items.filter(i=>i.provider===filterProvider);
  if(filterStatus)   items = items.filter(i=>i.paymentStatus===filterStatus);
  if(searchQuery)    items = items.filter(i=>
    i.title.toLowerCase().includes(searchQuery)||
    i.provider.toLowerCase().includes(searchQuery)||
    (i.influencerName||'').toLowerCase().includes(searchQuery)
  );

  const all = getCatContents(currentCatId);
  const paid = all.filter(i=>i.paymentStatus==='paid').length;
  const unpaid = all.filter(i=>i.paymentStatus==='unpaid').length;

  const providers = [...new Set(all.map(i=>i.provider))].filter(Boolean);

  document.getElementById('mainArea').innerHTML = `
  <div class="cat-view-header">
    <div class="cat-icon-big">${cat.icon}</div>
    <div class="cat-info">
      <h2>${cat.name}</h2>
      <p>${cat.type==='influencer'?'Influencer collaborations':cat.type==='model'?'Model reels':'Social media content'} · ${cat.isDefault?'Default category':'Custom category'}</p>
    </div>
    <div class="cat-stats">
      <div class="cat-stat"><div class="v">${all.length}</div><div class="l">Total</div></div>
      <div class="cat-stat"><div class="v" style="color:var(--green-500)">${paid}</div><div class="l">Paid</div></div>
      <div class="cat-stat"><div class="v" style="color:var(--red)">${unpaid}</div><div class="l">Unpaid</div></div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="openAddContent('${cat.id}')"><i class="fa-solid fa-plus"></i> Add Content</button>
  </div>

  <div class="filters-bar">
    <select class="filter-select" onchange="setFilterProvider(this.value)">
      <option value="">All Providers</option>
      ${providers.map(p=>`<option value="${p}" ${filterProvider===p?'selected':''}>${p}</option>`).join('')}
    </select>
    <span class="filter-tag ${!filterStatus?'active':''}" onclick="setFilterStatus('')">All</span>
    <span class="filter-tag ${filterStatus==='paid'?'active':''}" onclick="setFilterStatus('paid')"><i class="fa-solid fa-check"></i> Paid</span>
    <span class="filter-tag ${filterStatus==='unpaid'?'active':''}" onclick="setFilterStatus('unpaid')"><i class="fa-solid fa-clock"></i> Unpaid</span>
    <span class="filter-tag ${filterStatus==='pending'?'active':''}" onclick="setFilterStatus('pending')"><i class="fa-solid fa-hourglass-half"></i> Pending</span>
    ${!cat.isDefault?`<button class="btn btn-danger btn-sm" style="margin-left:auto" onclick="deleteCategory('${cat.id}')"><i class="fa-solid fa-trash"></i> Delete Category</button>`:''}
  </div>

  ${items.length===0?`
  <div class="empty">
    <div class="empty-icon">${cat.icon}</div>
    <h3>No content yet</h3>
    <p>Add your first piece of content for ${cat.name} to get started.</p>
    <button class="btn btn-primary" style="margin-top:16px" onclick="openAddContent('${cat.id}')"><i class="fa-solid fa-plus"></i> Add Content</button>
  </div>`:
  `<div class="content-grid">${items.map(cardHtml).join('')}</div>`}`;
}

function showAllContent(el){
  currentView='all'; currentCatId=null;
  setActiveNav(el);
  filterProvider=''; filterStatus=''; searchQuery='';
  renderAllContent();
}

function renderAllContent(){
  let items = [...DB.contents];
  if(filterProvider) items = items.filter(i=>i.provider===filterProvider);
  if(filterStatus)   items = items.filter(i=>i.paymentStatus===filterStatus);
  if(searchQuery)    items = items.filter(i=>
    (i.title||'').toLowerCase().includes(searchQuery)||
    (i.provider||'').toLowerCase().includes(searchQuery)
  );
  items.sort((a,b)=>new Date(b.dateAdded)-new Date(a.dateAdded));

  const providers = allProviders();
  document.getElementById('mainArea').innerHTML = `
  <div class="page-header">
    <div><div class="page-title">All Content</div><div class="page-sub">${DB.contents.length} total items</div></div>
    <button class="btn btn-primary btn-sm" onclick="openAddContent()"><i class="fa-solid fa-plus"></i> Add Content</button>
  </div>
  <div class="filters-bar">
    <select class="filter-select" onchange="setFilterProvider(this.value)">
      <option value="">All Providers</option>
      ${providers.map(p=>`<option value="${p}" ${filterProvider===p?'selected':''}>${p}</option>`).join('')}
    </select>
    <span class="filter-tag ${!filterStatus?'active':''}" onclick="setFilterStatus('')">All</span>
    <span class="filter-tag ${filterStatus==='paid'?'active':''}" onclick="setFilterStatus('paid')">Paid</span>
    <span class="filter-tag ${filterStatus==='unpaid'?'active':''}" onclick="setFilterStatus('unpaid')">Unpaid</span>
    <span class="filter-tag ${filterStatus==='pending'?'active':''}" onclick="setFilterStatus('pending')">Pending</span>
  </div>
  ${items.length===0?`<div class="empty"><div class="empty-icon">📭</div><h3>No content found</h3><p>Try adjusting your filters or add new content.</p></div>`:
  `<div class="content-grid">${items.map(cardHtml).join('')}</div>`}`;
}

function showProviders(el){
  currentView='providers'; currentCatId=null;
  setActiveNav(el);
  const providers = allProviders();
  let html = `<div class="page-header"><div><div class="page-title">Content Providers</div><div class="page-sub">${providers.length} providers</div></div></div>`;
  if(providers.length===0){
    html+=`<div class="empty"><div class="empty-icon">👤</div><h3>No providers yet</h3><p>Add content to see providers here.</p></div>`;
  } else {
    html+=`<div class="content-grid">`;
    providers.forEach(p=>{
      const items = DB.contents.filter(c=>c.provider===p);
      const paid = items.filter(i=>i.paymentStatus==='paid').length;
      const unpaid = items.filter(i=>i.paymentStatus==='unpaid').length;
      const totalAmt = items.reduce((a,c)=>a+(Number(c.amount)||0),0);
      html+=`<div class="content-card" onclick="setFilterProvider('${p}');showAllContent(null)">
        <div class="card-preview" style="height:90px;background:var(--green-800);justify-content:center">
          <div style="font-size:36px;font-weight:800;color:rgba(255,255,255,.4)">${initials(p)}</div>
        </div>
        <div class="card-body">
          <div class="card-title">${p}</div>
          <div style="display:flex;gap:8px;margin:6px 0">
            <span class="badge badge-paid">${paid} paid</span>
            <span class="badge badge-unpaid">${unpaid} unpaid</span>
          </div>
          <div style="font-size:12px;color:var(--text-3)">${items.length} items · ₹${totalAmt.toLocaleString('en-IN')} total</div>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }
  document.getElementById('mainArea').innerHTML = html;
}

// ══════════════════════════════════════════════════════
//  FILTER HELPERS
// ══════════════════════════════════════════════════════
function setFilterProvider(v){ filterProvider=v; rerender(); }
function setFilterStatus(v){ filterStatus=v; rerender(); }
function rerender(){
  if(currentView==='category') renderCategory();
  else if(currentView==='all') renderAllContent();
  else if(currentView==='dashboard') renderDashboard();
}

// ══════════════════════════════════════════════════════
//  MODAL HELPERS
// ══════════════════════════════════════════════════════
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

// ══════════════════════════════════════════════════════
//  CONTENT MODAL
// ══════════════════════════════════════════════════════
function populateCategorySelect(selectedId){
  const sel = document.getElementById('fCategory');
  sel.innerHTML = DB.categories.map(c=>`<option value="${c.id}" ${c.id===selectedId?'selected':''}>${c.icon} ${c.name}</option>`).join('');
  onCategoryChange();
}

function onCategoryChange(){
  const catId = document.getElementById('fCategory').value;
  const cat = getCat(catId);
  document.getElementById('modelFields').style.display = cat?.type==='model'?'block':'none';
  document.getElementById('influencerFields').style.display = cat?.type==='influencer'?'block':'none';
}

function openAddContent(catId){
  document.getElementById('contentModalTitle').textContent='Add Content';
  document.getElementById('editId').value='';
  document.getElementById('fTitle').value='';
  document.getElementById('fProvider').value='';
  document.getElementById('fDriveLink').value='';
  document.getElementById('fThumb').value='';
  document.getElementById('fPayStatus').value='unpaid';
  document.getElementById('fAmount').value='';
  document.getElementById('fDate').value=new Date().toISOString().slice(0,10);
  document.getElementById('fNotes').value='';
  document.getElementById('fModelName').value='';
  document.getElementById('fInfluencerName').value='';
  document.getElementById('fInfluencerPrice').value='';
  document.getElementById('fProduct').value='';
  populateCategorySelect(catId||currentCatId||DB.categories[0]?.id);
  openModal('contentModal');
}

function openEditContent(id){
  const item = DB.contents.find(c=>c.id===id);
  if(!item) return;
  document.getElementById('contentModalTitle').textContent='Edit Content';
  document.getElementById('editId').value=id;
  document.getElementById('fTitle').value=item.title||'';
  document.getElementById('fProvider').value=item.provider||'';
  document.getElementById('fDriveLink').value=item.driveLink||'';
  document.getElementById('fThumb').value=item.thumbnailUrl||'';
  document.getElementById('fPayStatus').value=item.paymentStatus||'unpaid';
  document.getElementById('fAmount').value=item.amount||'';
  document.getElementById('fDate').value=item.dateAdded||'';
  document.getElementById('fNotes').value=item.notes||'';
  document.getElementById('fModelName').value=item.modelName||'';
  document.getElementById('fInfluencerName').value=item.influencerName||'';
  document.getElementById('fInfluencerPrice').value=item.price||'';
  document.getElementById('fProduct').value=item.productIncluded||'';
  populateCategorySelect(item.categoryId);
  openModal('contentModal');
}

function saveContent(){
  const title = document.getElementById('fTitle').value.trim();
  const provider = document.getElementById('fProvider').value.trim();
  const catId = document.getElementById('fCategory').value;
  if(!title){toast('Please enter a title.','error');return;}
  if(!provider){toast('Please enter a provider name.','error');return;}
  const editId = document.getElementById('editId').value;
  const cat = getCat(catId);

  const item = {
    id: editId||uid(),
    categoryId: catId,
    title, provider,
    driveLink: document.getElementById('fDriveLink').value.trim(),
    thumbnailUrl: document.getElementById('fThumb').value.trim(),
    paymentStatus: document.getElementById('fPayStatus').value,
    amount: document.getElementById('fAmount').value||0,
    dateAdded: document.getElementById('fDate').value,
    notes: document.getElementById('fNotes').value.trim(),
    modelName: cat?.type==='model'?document.getElementById('fModelName').value.trim():'',
    influencerName: cat?.type==='influencer'?document.getElementById('fInfluencerName').value.trim():'',
    price: cat?.type==='influencer'?document.getElementById('fInfluencerPrice').value:'',
    productIncluded: cat?.type==='influencer'?document.getElementById('fProduct').value.trim():'',
    updatedAt: new Date().toISOString(),
  };
  if(!item.createdAt) item.createdAt = new Date().toISOString();

  if(editId){
    const idx = DB.contents.findIndex(c=>c.id===editId);
    if(idx>-1){ item.createdAt=DB.contents[idx].createdAt; DB.contents[idx]=item; }
    toast('Content updated.');
  } else {
    item.createdAt=new Date().toISOString();
    DB.contents.unshift(item);
    toast('Content added successfully.');
  }
  saveData(DB);
  closeModal('contentModal');
  renderSidebar();
  rerender();
}

// ══════════════════════════════════════════════════════
//  CATEGORY MODAL
// ══════════════════════════════════════════════════════
function openAddCategory(){
  document.getElementById('cName').value='';
  document.getElementById('cIcon').value='📁';
  document.getElementById('cType').value='default';
  openModal('categoryModal');
}

function saveCategory(){
  const name = document.getElementById('cName').value.trim();
  if(!name){toast('Category name required.','error');return;}
  const cat={
    id: uid(),
    name,
    icon: document.getElementById('cIcon').value||'📁',
    type: document.getElementById('cType').value,
    isDefault: false,
    createdAt: new Date().toISOString(),
  };
  DB.categories.push(cat);
  saveData(DB);
  closeModal('categoryModal');
  renderSidebar();
  toast(`Category "${name}" added.`);
  showCategory(cat.id, null);
}

function deleteCategory(catId){
  if(!confirm('Delete this category and ALL its content? This cannot be undone.')) return;
  DB.categories = DB.categories.filter(c=>c.id!==catId);
  DB.contents   = DB.contents.filter(c=>c.categoryId!==catId);
  saveData(DB);
  renderSidebar();
  toast('Category deleted.');
  showDashboard(document.querySelector('.nav-item'));
}

// ══════════════════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════════════════
function markPaid(id){
  const item = DB.contents.find(c=>c.id===id);
  if(!item) return;
  item.paymentStatus='paid';
  item.datePaid=new Date().toISOString();
  saveData(DB);
  renderSidebar();
  rerender();
  toast('Marked as paid ✓');
}

function deleteContent(id){
  if(!confirm('Delete this content item?')) return;
  DB.contents = DB.contents.filter(c=>c.id!==id);
  saveData(DB);
  renderSidebar();
  rerender();
  toast('Content deleted.');
}

function openPreview(id){
  const item = DB.contents.find(c=>c.id===id);
  if(!item) return;
  document.getElementById('previewTitle').textContent=item.title;
  document.getElementById('previewOpenLink').href=item.driveLink||'#';
  const body = document.getElementById('previewBody');
  const url = extractDrivePreview(item.driveLink);
  if(item.thumbnailUrl && isImage(item.thumbnailUrl)){
    body.innerHTML=`<img class="preview-img-full" src="${item.thumbnailUrl}" alt="preview"/>`;
  } else if(url){
    body.innerHTML=`<iframe class="preview-frame" src="${url}" allowfullscreen></iframe>`;
  } else {
    body.innerHTML=`<div class="empty"><div class="empty-icon">🔗</div><h3>No preview</h3><p>Open the link directly.</p></div>`;
  }
  openModal('previewModal');
}

function exportData(){
  const rows=[['Title','Provider','Category','Payment Status','Amount','Date Added','Drive Link','Notes','Model Name','Influencer Name','Price','Product']];
  DB.contents.forEach(i=>{
    const cat=getCat(i.categoryId);
    rows.push([i.title,i.provider,cat?cat.name:'',i.paymentStatus,i.amount,i.dateAdded,i.driveLink,i.notes,i.modelName,i.influencerName,i.price,i.productIncluded]);
  });
  const csv=rows.map(r=>r.map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='truyerba_content_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('CSV exported successfully.');
}

// ══════════════════════════════════════════════════════
//  SEARCH
// ══════════════════════════════════════════════════════
document.getElementById('globalSearch').addEventListener('input',e=>{
  searchQuery=e.target.value.toLowerCase().trim();
  if(searchQuery && currentView==='dashboard'){ showAllContent(null); }
  else rerender();
});

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('open'); });
});

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
renderSidebar();
showDashboard(document.querySelector('.nav-item'));
</script>
